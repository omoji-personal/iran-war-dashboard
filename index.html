<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iran War Dashboard</title>
  <meta property="og:title" content="Iran War Dashboard — Predictive Conflict Monitor" />
  <meta property="og:description" content="Predictive analysis: capability models, convergence vectors, oil shock, and business impact tracking for the 2026 Iran conflict." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="canonical" href="https://iran-war-dashboard-murex.vercel.app/" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230e1a2e'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23ffd166'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%23ff6b6b' stroke-width='1.5' stroke-dasharray='2 3'/%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="title">
        <h1 data-i18n="title">Iran War Dashboard</h1>
        <p data-i18n-html="subtitle">Predictive conflict analysis: capability models, convergence vectors, oil shock, and business impact.</p>
      </div>
      <div class="chips">
        <div class="chip"><span data-i18n="chipUpdate">Last data update:</span> <strong id="lastUpdated">&mdash;</strong></div>
        <div class="chip"><span data-i18n="chipFresh">Freshness:</span> <strong id="freshnessStatus">&mdash;</strong></div>
        <div class="chip"><span data-i18n="chipWindow">Data window:</span> <strong id="seriesThrough">&mdash;</strong></div>
        <div class="nav-wrap">
          <button class="nav-toggle" onclick="document.getElementById('sectionNav').classList.toggle('open')">&#9660; Jump to</button>
          <nav class="section-nav" id="sectionNav"></nav>
        </div>
        <div class="mode-toggle" id="modeToggle">
          <button class="mode-btn active" data-mode="ceasefire" onclick="setMode('ceasefire')">Ceasefire</button>
          <button class="mode-btn" data-mode="war" onclick="setMode('war')">War Mode</button>
        </div>
        <button class="lang-btn" id="langToggle" onclick="toggleLang()">فارسی</button>
      </div>
    </div>
  </div>

  <main class="shell" id="mainShell">
    <div class="loading-msg" id="loadingMsg">Loading dashboard data&hellip;</div>
  </main>

  <template id="dashboardTemplate">
    <!-- About -->
    <section class="panel" style="margin-bottom:16px;border-color:var(--gold);background:linear-gradient(135deg,rgba(255,209,102,.04),rgba(99,179,255,.04))" data-mode="war">
      <h3 style="color:var(--gold);margin-bottom:8px">How this dashboard works</h3>
      <div style="font-size:13px;line-height:1.65;color:var(--soft)">
        This dashboard predicts how the 2026 Iran war is most likely to end by analyzing <strong style="color:var(--text)">military data</strong> (daily missile/drone launches, stockpile estimates, aircraft losses), <strong style="color:var(--text)">economic signals</strong> (oil prices, Hormuz shipping traffic, gas prices), <strong style="color:var(--text)">political indicators</strong> (US approval ratings, casualty counts, coalition support), and <strong style="color:var(--text)">diplomatic activity</strong> (mediator meetings, proposals, ceasefire rejections). The core engine models war ending as three conditions that must align simultaneously: a viable deal must exist, the US must decide to take it, and Iran must accept it. The resolution probability is calibrated against prediction markets and historical conflict base rates. Updated daily at 7am ET.
      </div>
    </section>
    <section class="panel" style="margin-bottom:16px;border-color:var(--cyan);background:linear-gradient(135deg,rgba(70,215,176,.04),rgba(99,179,255,.04))" data-mode="ceasefire">
      <h3 style="color:var(--cyan);margin-bottom:8px">How this dashboard works</h3>
      <div style="font-size:13px;line-height:1.65;color:var(--soft)">
        This dashboard tracks the <strong style="color:var(--text)">2-week ceasefire</strong> (<span id="cfAboutRange">Apr 7–21</span>) and predicts whether it holds, extends, leads to a permanent deal, or collapses back to war. It analyzes <strong style="color:var(--text)">violation reports</strong>, <strong style="color:var(--text)">negotiation progress</strong> (Islamabad peace talks), <strong style="color:var(--text)">economic recovery</strong> (Hormuz reopening, oil normalization), and <strong style="color:var(--text)">political signals</strong> from both sides. The ceasefire engine models stability as a function of mediator engagement, diplomatic signals, Hormuz progress, proxy escalation, and violation severity. Calibrated against prediction markets and historical ceasefire survival rates. Switch to War Mode to see the full conflict analysis.
      </div>
    </section>

    <!-- Scrubber -->
    <div class="scrubber-wrap" id="scrubberWrap" style="display:none">
      <label class="scrubber-label">Timeline: <strong id="scrubberDay"></strong></label>
      <input type="range" id="scrubberSlider" class="scrubber-slider" min="1" max="1" value="1">
      <button id="scrubberReset" class="scrubber-reset" onclick="resetScrubber()">Live</button>
    </div>

    <!-- CF. Ceasefire Status Hero -->
    <section class="ceasefire-hero" data-mode="ceasefire">
      <div class="kicker" style="color:var(--cyan)">Ceasefire status</div>
      <div class="cf-status-display" id="cfStatusDisplay"></div>
      <div class="prob-display">
        <div class="prob-header">
          <span class="prob-label">Probability ceasefire holds through Apr 21</span>
          <span class="prob-pct" id="cfStabilityScore"></span>
        </div>
        <div class="prob-track"><div class="prob-bar" id="cfProbBar"></div></div>
        <div class="prob-meta"><span id="cfConfidenceRange" style="font-size:11px;color:var(--muted)"></span></div>
        <div class="prob-meta"><span id="cfStabilityRaw"></span></div>
      </div>
      <div class="grid cols-2" style="margin-top:16px;gap:16px">
        <div>
          <div class="sub" style="margin-bottom:8px;font-weight:700;color:var(--text)">Stability factors:</div>
          <div id="cfStabilityFactors"></div>
          <div style="margin-top:12px">
            <div class="sub" style="margin-bottom:8px;font-weight:700;color:var(--text)">Ceasefire holds when:</div>
            <div id="cfConditions"></div>
          </div>
        </div>
        <div>
          <div class="sub" style="margin-bottom:8px;font-weight:700;color:var(--text)">What happens after Apr 21?</div>
          <div id="cfOutcomeBreakdown"></div>
        </div>
      </div>
      <div class="metric-grid" id="cfMetrics" style="margin-top:16px"></div>
    </section>

    <!-- CF. Ceasefire Countdown + Scenario Tree -->
    <section class="grid cols-2" style="margin-top:16px" data-mode="ceasefire">
      <div class="panel">
        <div class="kicker" style="color:var(--cyan)">Ceasefire countdown</div>
        <div id="cfCountdown" style="font-size:42px;font-weight:900;margin:8px 0;color:var(--cyan)"></div>
        <div class="sub">Ceasefire Day <strong id="cfDayNum"></strong> of <span id="cfTotalDays">14</span><span id="cfExtensionNote"></span></div>
        <div class="prob-track" style="margin:12px 0"><div class="prob-bar" id="cfProgressBar" style="background:var(--cyan)"></div></div>
        <div id="cfCountdownContext" class="sub"></div>
      </div>
      <div class="panel">
        <div class="kicker" style="color:var(--gold)">Post-ceasefire scenarios</div>
        <h3 id="cfScenariosHeading">What happens after Apr 21?</h3>
        <div class="cf-scenarios-grid">
          <div class="cf-scenario" data-branch="extend">
            <div class="cf-scenario-head"><span class="cf-scenario-title">Extend</span><span class="cf-scenario-prob" id="cfProbExtend">—</span></div>
            <div class="timeline-vertical" id="cfBranchExtend"></div>
          </div>
          <div class="cf-scenario" data-branch="deal">
            <div class="cf-scenario-head"><span class="cf-scenario-title">Permanent deal</span><span class="cf-scenario-prob" id="cfProbDeal">—</span></div>
            <div class="timeline-vertical" id="cfBranchDeal"></div>
          </div>
          <div class="cf-scenario" data-branch="stalled">
            <div class="cf-scenario-head"><span class="cf-scenario-title">Hold without progress</span><span class="cf-scenario-prob" id="cfProbStalled">—</span></div>
            <div class="timeline-vertical" id="cfBranchStalled"></div>
          </div>
          <div class="cf-scenario" data-branch="collapse">
            <div class="cf-scenario-head"><span class="cf-scenario-title">Collapse back to war</span><span class="cf-scenario-prob" id="cfProbCollapse">—</span></div>
            <div class="timeline-vertical" id="cfBranchCollapse"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- CF. Violation Tracker -->
    <section class="panel" style="margin-top:16px" data-mode="ceasefire">
      <h3>Ceasefire violation tracker</h3>
      <div class="sub">Incidents, severity, and attribution since Apr 7.</div>
      <div id="cfViolationSummary" style="margin-bottom:12px"></div>
      <div class="chart-box" style="height:280px"><canvas id="cfViolationChart"></canvas></div>
      <div id="cfViolationList" style="margin-top:12px"></div>
    </section>

    <!-- CF. Negotiation Progress -->
    <section class="panel" style="margin-top:16px" data-mode="ceasefire">
      <h3>Islamabad peace talks tracker</h3>
      <div class="sub">VP Vance delegation progress and next steps.</div>
      <div id="cfNegotiationTimeline"></div>
    </section>

    <!-- CF. Economic Recovery -->
    <div id="cfRecoverySummary" data-mode="ceasefire"></div>
    <section class="grid cols-2" style="margin-top:16px" data-mode="ceasefire">
      <div class="panel">
        <h3>Hormuz reopening progress</h3>
        <div class="sub">Vessels per day recovering toward 135 pre-war baseline.</div>
        <div class="chart-box"><canvas id="cfHormuzRecoveryChart"></canvas></div>
      </div>
      <div class="panel">
        <h3>Oil normalization</h3>
        <div class="sub">War premium unwinding. Pre-war baseline: $65 Brent.</div>
        <div class="chart-box"><canvas id="cfOilRecoveryChart"></canvas></div>
      </div>
    </section>

    <!-- 1. Decision Engine Hero -->
    <section class="prediction-hero" data-mode="war">
      <div class="kicker" data-i18n="kickerPrediction">War outcome forecast</div>
      <div class="outcome-forecast" id="outcomeForecast"></div>
      <div class="prob-display">
        <div class="prob-header">
          <span class="prob-label">Probability of resolution within 3 weeks</span>
          <span class="prob-pct" id="convergenceScore"></span>
        </div>
        <div class="prob-track"><div class="prob-bar" id="probBar"></div></div>
        <div class="prob-meta"><span id="convergenceRaw"></span></div>
      </div>
      <div class="grid cols-2" style="margin-top:16px;gap:16px">
        <div>
          <div class="sub" style="margin-bottom:8px;font-weight:700;color:var(--text)">For the war to end, all three must be true:</div>
          <div id="decisionConditions"></div>
        </div>
        <div>
          <div class="sub" style="margin-bottom:8px;font-weight:700;color:var(--text)">What happens next? Most likely outcomes:</div>
          <div id="outcomeBreakdown"></div>
          <div class="sub" style="margin-top:12px;font-weight:700;color:var(--text)">How we arrive at this estimate:</div>
          <div id="calibrationAnchors"></div>
        </div>
      </div>
      <div class="metric-grid" id="metrics" style="margin-top:16px"></div>
    </section>

    <!-- 2. Scenario Simulator -->
    <section class="panel" style="margin-top:16px">
      <div class="kicker">What-if scenarios</div>
      <h3>Scenario simulator</h3>
      <div class="sub">Toggle a scenario to see how it changes the resolution probability and oil price.</div>
      <div id="simButtons" class="sim-buttons"></div>
      <div id="simResult" class="sim-result" style="display:none"></div>
    </section>

    <!-- 3. Engine Analytics -->
    <section class="panel" style="margin-top:16px">
      <div class="grid cols-3" style="gap:24px">
        <div>
          <h3 style="margin-bottom:12px">Key trends</h3>
          <div id="leadingIndicators"></div>
        </div>
        <div>
          <h3 style="margin-bottom:12px">Estimate history</h3>
          <div id="probChangelog"></div>
        </div>
        <div>
          <h3 style="margin-bottom:12px">What would change things?</h3>
          <div id="sensitivityBars"></div>
        </div>
      </div>
    </section>

    <!-- 4. Capability Thesis -->
    <section class="panel" style="margin-top:16px" data-mode="war">
      <div class="kicker" data-i18n="kickerThesis">Capability thesis</div>
      <h2 data-i18n="hThesis">Depleted or Rationing?</h2>
      <div class="sub" data-i18n="subThesis">Two models of Iran's launch tempo — each implies a different war outcome. Dashed lines = 14-day forecast.</div>
      <div class="chart-box tall"><canvas id="thesisChart"></canvas></div>
      <div class="model-cards" id="modelCards"></div>
    </section>

    <!-- 5. Stockpile + Engine Inputs (side by side) -->
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel">
        <h3>Stockpile burn rate</h3>
        <div class="sub">How long can Iran sustain fire?</div>
        <div id="stockpileCards"></div>
        <div class="footnote" style="margin-top:10px"><strong>Fired to date:</strong> <span id="burnedToDate"></span></div>
      </div>
      <div class="panel">
        <h3>Pressure factors over time</h3>
        <div class="sub">Five key pressures driving the war toward resolution, each scored 0-10. Higher = more pressure.</div>
        <div class="chart-box tall"><canvas id="vectorChart"></canvas></div>
      </div>
    </section>

    <!-- 6. Deadline + Escalation Ladder -->
    <section class="grid cols-2" style="margin-top:16px" data-mode="war">
      <div class="panel">
        <div class="kicker" style="color:var(--red)">April 7 deadline</div>
        <div id="deadlineCountdown" style="font-size:32px;font-weight:900;margin:8px 0"></div>
        <div id="deadlineContext" class="sub"></div>
        <div class="grid cols-2" style="margin-top:12px">
          <div>
            <h4 style="color:var(--cyan);margin:0 0 8px">If deal</h4>
            <div class="timeline-vertical" id="branchDeal"></div>
          </div>
          <div>
            <h4 style="color:var(--red);margin:0 0 8px">If no deal</h4>
            <div class="timeline-vertical" id="branchNoDeal"></div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="kicker" style="color:var(--red)">Escalation status</div>
        <h3>Escalation ladder</h3>
        <div id="escalationLadder"></div>
      </div>
    </section>

    <!-- 7. Situation Report -->
    <section class="panel" style="margin-top:16px">
      <h2 data-i18n="hSitrep">Situation Report</h2>
      <div class="theory" id="theoryBox"></div>
      <ul class="list" id="sitrep" style="margin-top:12px"></ul>
      <div class="footnote" id="sourceNotes"></div>
    </section>

    <!-- 8. Launch Tempo -->
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel"><h3 data-i18n="hMissile">Daily ballistic missile launches</h3><div class="sub" data-i18n="subMissile">Daily counts, not cumulative. Trend line included.</div><div class="chart-box"><canvas id="missileChart"></canvas></div><div class="footnote" id="missileFoot"></div></div>
      <div class="panel"><h3 data-i18n="hDrone">Daily drone launches</h3><div class="sub" data-i18n="subDrone">Daily counts, not cumulative.</div><div class="chart-box"><canvas id="droneChart"></canvas></div><div class="footnote" id="droneFoot"></div></div>
    </section>
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel"><h3 data-i18n="hCombo">Combined launch tempo</h3><div class="sub" data-i18n="subCombo">Missiles and drones together — converging or diverging?</div><div class="chart-box tall"><canvas id="comboChart"></canvas></div></div>
      <div class="panel"><h3 data-i18n="hCumul">Cumulative strikes</h3><div class="sub" data-i18n="subCumul">Running total since Day 1.</div><div class="chart-box tall"><canvas id="cumulChart"></canvas></div></div>
    </section>

    <!-- 9. Oil + Hormuz -->
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel"><h3 data-i18n="hOilOverlay">Oil price vs conflict intensity</h3><div class="sub" data-i18n="subOilOverlay">Dual axis: markets responding to military tempo or diplomatic signals?</div><div class="chart-box tall"><canvas id="oilOverlayChart"></canvas></div><div class="footnote" id="oilFoot"></div></div>
      <div class="panel"><h3>Oil price scenario bands</h3><div class="sub">Where oil goes depends on which outcome.</div><div class="chart-box tall"><canvas id="oilBandsChart"></canvas></div></div>
    </section>
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel"><h3>Hormuz Strait transit rate</h3><div class="sub">Vessels per day through Hormuz — the most consequential economic metric of the war.</div><div class="chart-box tall"><canvas id="hormuzTransitChart"></canvas></div><div class="footnote" id="hormuzTransitNote"></div></div>
      <div class="panel"><h3 data-i18n="hOil">Oil: Brent vs WTI</h3><div class="sub">Both benchmarks tracking together. Spread = Hormuz premium.</div><div class="chart-box tall"><canvas id="oilChart"></canvas></div></div>
    </section>

    <!-- 10. Target Breakdown + Cumulative by Country -->
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel"><h3 data-i18n="hTargetM">Missile strikes by target</h3><div class="sub" data-i18n="subTarget">Latest daily slice.</div><div class="chart-box short"><canvas id="targetMissileChart"></canvas></div><div class="footnote" id="targetMissileFoot"></div></div>
      <div class="panel"><h3 data-i18n="hTargetD">Drone strikes by target</h3><div class="sub" data-i18n="subTargetD">Theater narrowing or spreading?</div><div class="chart-box short"><canvas id="targetDroneChart"></canvas></div><div class="footnote" id="targetDroneFoot"></div></div>
    </section>
    <section class="panel" style="margin-top:16px">
      <h3>Cumulative strikes by country</h3>
      <div class="sub">Total missiles + drones received per country since Day 1.</div>
      <div class="chart-box" style="height:320px"><canvas id="cumulByCountryChart"></canvas></div>
    </section>

    <!-- 11. Diplomacy + Key Actors -->
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel"><h3 data-i18n="hDiplomacy">Diplomacy & negotiations</h3><div class="sub" data-i18n="subDiplomacy">Peace proposals, intermediaries, and positions.</div><ul class="list" id="diplomacyBox"></ul></div>
      <div class="panel"><h3 data-i18n="hKeyActors">Key actors & alliances</h3><div class="sub" data-i18n="subKeyActors">Who's involved and their roles.</div><ul class="list" id="keyActorsBox"></ul></div>
    </section>

    <!-- 12. War Support Index + Decapitation -->
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel">
        <h3>War support index</h3>
        <div class="sub">US-led coalition cohesion — tracking ally defections and support erosion.</div>
        <div class="chart-box" style="height:280px"><canvas id="coalitionChart"></canvas></div>
        <div id="coalitionEvents" style="margin-top:12px"></div>
      </div>
      <div class="panel">
        <h3>Iran command decapitation tracker</h3>
        <div class="sub">Is Iran's command structure degrading or regenerating?</div>
        <div id="decapitationList"></div>
      </div>
    </section>

    <!-- 13. Hormuz & Public Opinion -->
    <section class="grid cols-2" style="margin-top:16px">
      <div class="panel"><h3 data-i18n="hHormuz">Hormuz Strait & safe passage</h3><div class="sub" data-i18n="subHormuz">Blockade status, mine fields, and transit frameworks.</div><ul class="list" id="hormuzBox"></ul><div style="margin-top:14px" id="shippingRoutesStandalone"></div></div>
      <div class="panel"><h3 data-i18n="hPublicOpinion">Public opinion</h3><div class="sub" data-i18n="subPublicOpinion">US polling and international reaction.</div><ul class="list" id="publicOpinionBox"></ul></div>
    </section>

    <!-- 14. Business: Iranfarhang -->
    <section class="panel" style="margin-top:16px">
      <h2>Iranfarhang</h2>
      <div class="sub">Persian book supply chain — Tehran HQ to 40+ academic institutions worldwide</div>
      <div class="grid cols-2" style="margin-top:12px">
        <div>
          <div class="biz-section"><h4 data-i18n="hImpact">Impact</h4><ul class="list" id="impactIranfarhang"></ul></div>
          <div class="biz-section"><h4 data-i18n="hPrep">Preparation priorities</h4><ul class="list" id="prepIranfarhang"></ul></div>
          <div class="biz-section"><h4 data-i18n="hSignals">Signals to watch</h4><ul class="list" id="signalsIranfarhang"></ul></div>
        </div>
        <div>
          <div class="biz-section"><h4 data-i18n="hSupplyTimeline">Supply chain recovery timeline</h4><div class="timeline-vertical" id="ifSupplyTimeline"></div></div>
          <div class="biz-section"><h4 data-i18n="hRoutes">Route viability</h4><div id="ifRouteViability"></div></div>
        </div>
      </div>
      <div class="grid cols-3" style="margin-top:12px">
        <div class="status-card" id="ifOfacCard"></div>
        <div class="status-card" id="ifCommsCard"></div>
        <div class="status-card" id="ifInventoryCard"></div>
      </div>
      <div class="biz-section" style="margin-top:12px">
        <h4 data-i18n="hPublishing" style="color:var(--purple)">Iranian publishing industry status</h4>
        <ul class="list" id="publishingStatusBox"></ul>
        <h4 data-i18n="hPublishingDeep" style="color:var(--purple);margin-top:14px">Publishing deep dive</h4>
        <ul class="list" id="publishingDeepDiveBox"></ul>
      </div>
    </section>

    <!-- 15. Business: KIP -->
    <section class="panel" style="margin-top:16px">
      <h2>KIP</h2>
      <div class="sub">Import-export operations — Dubai logistics hub</div>
      <div class="risk-gauge" id="kipBankingGauge"></div>
      <div class="grid cols-2" style="margin-top:12px">
        <div>
          <div class="biz-section"><h4 data-i18n="hImpact">Impact</h4><ul class="list" id="impactKIP"></ul></div>
          <div class="biz-section"><h4 data-i18n="hPrep">Preparation priorities</h4><ul class="list" id="prepKIP"></ul></div>
          <div class="biz-section"><h4 data-i18n="hSignals">Signals to watch</h4><ul class="list" id="signalsKIP"></ul></div>
        </div>
        <div>
          <div class="biz-section"><h4 data-i18n="hAltHubs">Alternative hub comparison</h4><div class="table-wrap" id="kipHubMatrix"></div></div>
          <div class="biz-section"><h4 data-i18n="hHormuzTimeline">Hormuz reopening timeline</h4><div class="timeline-vertical" id="kipHormuzTimeline"></div></div>
        </div>
      </div>
      <div class="grid cols-2" style="margin-top:12px">
        <div class="status-card" id="kipCargoCard"></div>
        <div class="status-card">
          <div class="sc-header"><span class="sc-title" data-i18n="hInsurance">Insurance cost index</span></div>
          <div class="chart-box" style="height:200px"><canvas id="insuranceChart"></canvas></div>
        </div>
      </div>
    </section>

    <!-- 16. Event Log -->
    <section class="panel" style="margin-top:16px">
      <h3 data-i18n="hLog">Event log</h3><div class="sub" data-i18n="subLog">Newest first.</div>
