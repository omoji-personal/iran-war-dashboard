name: Update War Data

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p \
            "Read the file CLAUDE_UPDATE_PROMPT.md for your full instructions. Then read war-data.json. Search the web for the latest Iran war developments. Use multiple searches. Perform a FULL re-analysis of ALL data in war-data.json. Write the updated war-data.json to this directory." \
            --dangerously-skip-permissions \
            --max-turns 25

      - name: Commit and push
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          git add war-data.json
          git diff --cached --quiet || {
            git commit -m "auto-update war-data $(date -u '+%Y-%m-%dT%H:%MZ')"
            git push origin main
          }
